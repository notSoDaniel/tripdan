## ── Application ──────────────────────────────────────────────
quarkus.application.name=tripdan

## ── HTTP ─────────────────────────────────────────────────────
quarkus.http.port=8080

## ── CORS (Quarkus 3.x) ───────────────────────────────────────
quarkus.rest.cors=true
quarkus.rest.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.rest.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS

## ── OpenAPI / Swagger UI ─────────────────────────────────────
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

## ── DEV profile (H2 in-memory) ───────────────────────────────
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:tripdan;DB_CLOSE_DELAY=-1
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true

## ── TEST profile (H2 in-memory) ──────────────────────────────
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:tripdan-test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create

## ── PROD profile (PostgreSQL via env vars) ───────────────────
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.hibernate-orm.database.generation=update
